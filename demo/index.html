<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyet Fonts - Documentation & Preview</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>D</text></svg>">
    
    <!-- Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @font-face {
            font-family: 'Duyet Serif';
            src: url('./fonts/duyet-serif/woff2/DuyetSerif-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Duyet Serif';
            src: url('./fonts/duyet-serif/woff2/DuyetSerif-Italic.woff2') format('woff2');
            font-weight: 400;
            font-style: italic;
        }

        :root {
            --bg: #F5F4EF;
            --text: #141413;
            --accent: #D97757;
            --secondary: #5A5A55;
            --code-bg: #EAE9E4;
            --card-bg: #FFFFFF;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Duyet Serif', serif; /* APPLYING FONT TO EVERYTHING */
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            margin-bottom: 4rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header-title h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .header-links {
            display: flex;
            gap: 1.5rem;
        }

        .header-links a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid var(--text);
            padding-bottom: 2px;
            font-weight: 500;
        }

        /* Specimen Sheet */
        .specimen-sheet {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            margin-bottom: 6rem;
        }

        .specimen-meta {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 1rem;
            font-family: -apple-system, sans-serif; /* Clean sans for meta */
        }

        .editable {
            outline: none;
            caret-color: var(--accent);
            font-variant-numeric: tabular-nums;
            font-size: 8rem;
            line-height: 0.9;
            letter-spacing: -0.04em;
        }

        .editable span { color: var(--accent); }

        /* README Rendering Styles */
        #readme-content h1, #readme-content h2, #readme-content h3 {
            margin-top: 4rem;
            letter-spacing: -0.01em;
        }
        
        #readme-content h1 { font-size: 3.5rem; }
        #readme-content h2 { font-size: 2.5rem; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 0.5rem; }
        #readme-content h3 { font-size: 1.8rem; }

        #readme-content p {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
        }

        #readme-content code {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            background: var(--code-bg);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }

        #readme-content pre {
            background: var(--code-bg);
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 2rem 0;
        }

        #readme-content pre code {
            background: transparent;
            padding: 0;
        }

        #readme-content a {
            color: var(--accent);
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .editable { font-size: 4rem; }
            .header-title h1 { font-size: 3rem; }
            header { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }

        footer {
            text-align: center;
            padding: 4rem 0;
            color: var(--secondary);
            font-size: 0.9rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-title">
                <h1>Duyet Fonts</h1>
                <p>Click any number below to test the typography.</p>
            </div>
            <div class="header-links">
                <a href="https://github.com/duyet/fonts" target="_blank">GitHub</a>
                <a href="https://www.npmjs.com/package/@duyet/fonts" target="_blank">NPM</a>
            </div>
        </header>

        <section id="specimen">
            <div class="specimen-sheet">
                <div class="specimen-meta">Interactive Specimen / Tabular Numerals</div>
                <div class="editable" contenteditable="true">
                    12,045<span>.</span>67
                </div>
            </div>
        </section>

        <!-- Dynamic README Content -->
        <article id="readme-content">
            Loading documentation...
        </article>

        <footer>
            &copy; 2026 Duyet Le. All fonts licensed under SIL Open Font License 1.1.
        </footer>
    </div>

    <script>
        // Fetch and Render README.md
        async function loadReadme() {
            try {
                const response = await fetch('README.md');
                const text = await response.text();
                // We remove the first heading from README to avoid duplication with our header
                const cleanText = text.replace(/^# Duyet Fonts\n/, '');
                document.getElementById('readme-content').innerHTML = marked.parse(cleanText);
            } catch (e) {
                document.getElementById('readme-content').innerHTML = "Error loading README.md";
            }
        }
        loadReadme();
    </script>
</body>
</html>
